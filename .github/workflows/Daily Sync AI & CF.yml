name: Daily Sync All

on:
  schedule:
    # 每天 UTC 20:00 (香港時間 04:00) 執行
    - cron: '0 20 * * *'
  workflow_dispatch: # 允許手動執行
  push:
    paths:
      - '**.py' # 當 Python 腳本修改時自動測試運行

jobs:
  sync-all:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 給予寫入權限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      # --- 1. 共用前置準備 ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      # ========================================================
      # 任務 1: CF-IPs 更新 (獨立檢查)
      # ========================================================
      - name: "[CF] 下載 CF-IPs.txt"
        # 將 GitHub Secret 賦值給環境變數 CF_URL
        env:
          CF_URL: ${{ secrets.CF_IP_URL }}
        run: |
          # 檢查 Secret 是否有正確載入
          if [ -z "$CF_URL" ]; then
            echo "錯誤：找不到 CF_IP_URL Secret，請先在 GitHub Settings 中設定！"
            exit 1
          fi
          
          # 下載並直接覆蓋舊檔案 (使用環境變數)
          wget -q -O CF-IPs.txt "$CF_URL"
          
          if [ ! -f CF-IPs.txt ] || [ ! -s CF-IPs.txt ]; then
            echo "Download failed or file is empty!"
            exit 1
          fi

      - name: "[CF] 檢查變更 & 提交"
        run: |
          git add CF-IPs.txt
          
          # 只有當內容真的變了，才提交
          if git diff --staged --quiet; then
            echo "✅ CF-IPs.txt 內容無變化，跳過提交。"
          else
            current_time=$(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M')
            git commit -m "🔄 自動同步 CF-IPs.txt (📅 $current_time)"
            echo "🚀 CF-IPs 已更新並提交。"
          fi

      # ========================================================
      # 任務 2: AI 規則更新 & 編譯 (獨立檢查)
      # ========================================================
      - name: "[AI] 安裝依賴 & 編譯工具"
        run: |
          # 1. Python 依賴
          pip install requests PyYAML
          
          # 2. 下載 Mihomo
          MIHOMO_URL=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r '.assets[] | select(.name | contains("linux-amd64") and (contains("compatible")|not) and contains(".gz")) | .browser_download_url' | head -n 1)
          wget -q -O mihomo.gz "$MIHOMO_URL" && gzip -d mihomo.gz
          sudo mv mihomo /usr/local/bin/ && sudo chmod +x /usr/local/bin/mihomo
          
          # 3. 下載 Sing-box
          SINGBOX_URL=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r '.assets[] | select(.name | contains("linux-amd64") and contains("tar.gz")) | .browser_download_url' | head -n 1)
          wget -q -O sing-box.tar.gz "$SINGBOX_URL" && tar -zxf sing-box.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/ && sudo chmod +x /usr/local/bin/sing-box
          rm -rf sing-box.tar.gz sing-box-*

      - name: "[AI] 執行腳本 & 編譯規則"
        run: |
          echo ">>> 1. 執行 Python 腳本 (生成 List/Json/Conf/Dae) <<<"
          python geosite_ai_hk.py || echo "Warning: geosite script failed"
          python Shadowrocket_rules.py || echo "Warning: shadowrocket script failed"
          
          echo ">>> 2. 執行編譯指令 (覆蓋模式) <<<"
          # Mihomo: List -> MRS
          if [ -f "geosite_ai_hk_proxy.list" ]; then
            mihomo convert-ruleset domain text geosite_ai_hk_proxy.list geosite_ai_hk_proxy.mrs
          fi

          # Sing-box: Json -> SRS
          if [ -f "geosite_ai_hk_proxy.json" ]; then
             sing-box rule-set compile --output geosite_ai_hk_proxy.srs geosite_ai_hk_proxy.json
          fi

      - name: "[AI] 檢查變更 & 提交"
        run: |
          # 將所有變更（包含新生成的 .dae 檔案）加入暫存區
          git add .
          
          # Git 會自動比對 Hash 值
          if git diff --staged --quiet; then
            echo "✅ AI 規則 (包含 .mrs/.srs/.dae) 內容完全一致，無需更新。"
          else
            current_time=$(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M')
            git commit -m "🔄 自動同步 AI 規則 (📅 $current_time)"
            echo "🚀 AI 規則已更新並提交。"
          fi

      # ========================================================
      # 最終推送 (如果上面有任何一個任務產生了 Commit)
      # ========================================================
      - name: Push All Changes
        run: |
          git push
