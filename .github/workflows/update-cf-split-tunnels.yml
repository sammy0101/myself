name: Cloudflare Zero Trust 分割隧道 (non-cn)

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  update-tunnels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Fetch, Parse and Update Cloudflare API
        env:
          CF_API_Zero_Trust_TOKEN: ${{ secrets.CF_API_Zero_Trust_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          POLICY_NAME: "non-cn"
        run: |
          python - << 'EOF'
          import os
          import requests
          import ipaddress
          
          CF_API_Zero_Trust_TOKEN = os.environ.get("CF_API_Zero_Trust_TOKEN")
          CF_ACCOUNT_ID = os.environ.get("CF_ACCOUNT_ID")
          POLICY_NAME = os.environ.get("POLICY_NAME")
          
          if not CF_API_Zero_Trust_TOKEN or not CF_ACCOUNT_ID:
              print("錯誤: 找不到 CF_API_Zero_Trust_TOKEN 或 CF_ACCOUNT_ID 環境變數。")
              exit(1)
              
          headers = {
              "Authorization": f"Bearer {CF_API_Zero_Trust_TOKEN}",
              "Content-Type": "application/json"
          }
          
          print(f"正在獲取帳戶 {CF_ACCOUNT_ID} 的裝置設定檔清單...")
          resp = requests.get(f"https://api.cloudflare.com/client/v4/accounts/{CF_ACCOUNT_ID}/devices/policies", headers=headers)
          if resp.status_code != 200:
              print("取得 Policy 清單失敗:", resp.text)
              exit(1)
              
          policies = resp.json().get("result",[])
          policy_id = None
          for p in policies:
              if p.get("name") == POLICY_NAME:
                  policy_id = p.get("policy_id") or p.get("id")
                  break
                  
          if not policy_id:
              print(f"錯誤: 找不到名稱為 '{POLICY_NAME}' 的設定檔。")
              exit(1)
          
          # ==========================================
          # 來源定義與自訂網域
          # ==========================================
          ip_cn_url = "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo-lite/geoip/cn.list"
          ip_private_url = "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo-lite/geoip/private.list"
          
          # 自訂域名排除（配合 IP 繞過共同生效，最大化節省條數）
          CUSTOM_DOMAINS = [
              "*.cn",
              "cn"
          ]
          
          print("正在下載來源清單 (CN IPs & Private IPs)...")
          ip_cn_resp = requests.get(ip_cn_url)
          ip_private_resp = requests.get(ip_private_url)
          
          private_v4_nets = set()
          private_v6_nets = set()
          cn_v4_nets = set()
          cn_v6_nets = set()
          
          # ==========================================
          # 1. 解析 私有 IP (精確保留，不壓縮)
          # ==========================================
          for line in ip_private_resp.text.splitlines():
              line = line.strip()
              if not line or line.startswith("#"): continue
              try:
                  net = ipaddress.ip_network(line, strict=False)
                  if net.version == 4:
                      private_v4_nets.add(net)
                  else:
                      private_v6_nets.add(net)
              except ValueError: pass
          
          private_v4_collapsed = list(ipaddress.collapse_addresses(private_v4_nets))
          private_v6_collapsed = list(ipaddress.collapse_addresses(private_v6_nets))

          # ==========================================
          # 2. 解析 中國 IP (等待動態壓縮)
          # ==========================================
          for line in ip_cn_resp.text.splitlines():
              line = line.strip()
              if not line or line.startswith("#"): continue
              try:
                  net = ipaddress.ip_network(line, strict=False)
                  if net.version == 4:
                      cn_v4_nets.add(net)
                  else:
                      cn_v6_nets.add(net)
              except ValueError: pass

          # ==========================================
          # 3. 雙向保底動態壓縮演算法 (安全控制在 1,000 條限制內)
          # ==========================================
          MAX_TARGET = 950  # 目標條數安全上限（保留 50 條彈性空間）
          
          def compress_networks(networks, prefix_limit):
              adjusted = set()
              for net in networks:
                  if net.prefixlen > prefix_limit:
                      adjusted.add(net.supernet(new_prefix=prefix_limit))
                  else:
                      adjusted.add(net)
              return list(ipaddress.collapse_addresses(adjusted))
          
          v4_prefix = 24  # IPv4 最高精確度 (起點)
          v6_prefix = 48  # IPv6 最高精確度 (起點)
          
          print("正在執行精準度適配與動態壓縮...")
          while True:
              collapsed_cn_v4 = compress_networks(cn_v4_nets, v4_prefix)
              collapsed_cn_v6 = compress_networks(cn_v6_nets, v6_prefix)
              
              total_rules = (
                  len(private_v4_collapsed) + 
                  len(private_v6_collapsed) + 
                  len(CUSTOM_DOMAINS) + 
                  len(collapsed_cn_v4) + 
                  len(collapsed_cn_v6)
              )
              
              if total_rules <= MAX_TARGET:
                  print(f"ℹ️ 動態適配成功。最終 IPv4 遮罩深度: /{v4_prefix}, IPv6: /{v6_prefix}")
                  break
                  
              # 哪邊規則數量多，且還沒到極限，就優先壓縮哪邊；若一邊到極限，就轉而壓縮另一邊
              if len(collapsed_cn_v4) >= len(collapsed_cn_v6):
                  if v4_prefix > 12:
                      v4_prefix -= 1
                  elif v6_prefix > 32:
                      v6_prefix -= 1
                  else:
                      print("⚠️ 已達到最大壓縮極限 (IPv4: /12, IPv6: /32)，無法再進一步壓縮。")
                      break
              else:
                  if v6_prefix > 32:
                      v6_prefix -= 1
                  elif v4_prefix > 12:
                      v4_prefix -= 1
                  else:
                      print("⚠️ 已達到最大壓縮極限 (IPv4: /12, IPv6: /32)，無法再進一步壓縮。")
                      break

          # ==========================================
          # 4. 按優先順序組合最終寫入清單
          # ==========================================
          split_tunnels = []
          
          # 1. 內網私有 IP
          for net in private_v4_collapsed:
              split_tunnels.append({"address": str(net), "description": "Private IPv4"})
          for net in private_v6_collapsed:
              split_tunnels.append({"address": str(net), "description": "Private IPv6"})
              
          # 2. 自訂排除域名
          for domain in CUSTOM_DOMAINS:
              split_tunnels.append({"host": domain, "description": f"Custom Domain ({domain})"})
              
          # 3. 自動動態壓縮的大陸 IP 網段
          for net in collapsed_cn_v4:
              split_tunnels.append({"address": str(net), "description": "Auto CN IPv4 (Aggregated)"})
          for net in collapsed_cn_v6:
              split_tunnels.append({"address": str(net), "description": "Auto CN IPv6 (Aggregated)"})

          # ==========================================
          # 提交 API (硬截斷保底防線)
          # ==========================================
          if len(split_tunnels) > MAX_TARGET:
              print(f"⚠️ 警告: 即使經過動態壓縮總數仍有 {len(split_tunnels)} 條，執行截斷至 {MAX_TARGET} 條...")
              split_tunnels = split_tunnels[:MAX_TARGET]
              
          print(f"📊 最終寫入數量: {len(split_tunnels)} 條")
          
          put_url = f"https://api.cloudflare.com/client/v4/accounts/{CF_ACCOUNT_ID}/devices/policy/{policy_id}/exclude"
          update_resp = requests.put(put_url, headers=headers, json=split_tunnels)
          
          if update_resp.status_code == 200 and update_resp.json().get("success"):
              print("✅ 成功更新 Cloudflare Split Tunnels (Exclude)！")
          else:
              print("❌ 更新失敗:")
              print(update_resp.text)
              exit(1)
          EOF
