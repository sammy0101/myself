name: Cloudflare Zero Trust 分割隧道 (non-cn)

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  update-tunnels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Fetch, Parse and Update Cloudflare API
        env:
          CF_API_Zero_Trust_TOKEN: ${{ secrets.CF_API_Zero_Trust_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          POLICY_NAME: "non-cn"
        run: |
          python - << 'EOF'
          import os
          import requests
          import ipaddress
          
          CF_API_Zero_Trust_TOKEN = os.environ.get("CF_API_Zero_Trust_TOKEN")
          CF_ACCOUNT_ID = os.environ.get("CF_ACCOUNT_ID")
          POLICY_NAME = os.environ.get("POLICY_NAME")
          
          if not CF_API_Zero_Trust_TOKEN or not CF_ACCOUNT_ID:
              print("錯誤: 找不到 CF_API_Zero_Trust_TOKEN 或 CF_ACCOUNT_ID 環境變數。")
              exit(1)
              
          headers = {
              "Authorization": f"Bearer {CF_API_Zero_Trust_TOKEN}",
              "Content-Type": "application/json"
          }
          
          print(f"正在獲取帳戶 {CF_ACCOUNT_ID} 的裝置設定檔清單...")
          resp = requests.get(f"https://api.cloudflare.com/client/v4/accounts/{CF_ACCOUNT_ID}/devices/policies", headers=headers)
          if resp.status_code != 200:
              print("取得 Policy 清單失敗:", resp.text)
              exit(1)
              
          policies = resp.json().get("result",[])
          policy_id = None
          for p in policies:
              if p.get("name") == POLICY_NAME:
                  policy_id = p.get("policy_id") or p.get("id")
                  break
                  
          if not policy_id:
              print(f"錯誤: 找不到名稱為 '{POLICY_NAME}' 的設定檔。")
              exit(1)
          
          # ==========================================
          # 來源定義與自訂網域
          # ==========================================
          ip_cn_url = "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo-lite/geoip/cn.list"
          
          CUSTOM_DOMAINS = [
              "*.cn",
              "cn"
          ]
          
          print("正在下載來源清單 (CN IPv4)...")
          ip_cn_resp = requests.get(ip_cn_url)
          
          cn_v4_nets = set()
          
          # ==========================================
          # 1. 解析 中國 IPv4 IP (過濾掉 IPv6)
          # ==========================================
          for line in ip_cn_resp.text.splitlines():
              line = line.strip()
              if not line or line.startswith("#"): continue
              try:
                  net = ipaddress.ip_network(line, strict=False)
                  if net.version == 4:
                      cn_v4_nets.add(net)
              except ValueError: pass

          # ==========================================
          # 2. 僅針對 IPv4 的動態壓縮演算法 (精準卡在 950 條內)
          # ==========================================
          MAX_TARGET = 950  # 目標條數安全上限
          
          def compress_networks(networks, prefix_limit):
              adjusted = set()
              for net in networks:
                  if net.prefixlen > prefix_limit:
                      adjusted.add(net.supernet(new_prefix=prefix_limit))
                  else:
                      adjusted.add(net)
              return list(ipaddress.collapse_addresses(adjusted))
          
          v4_prefix = 24  # IPv4 最初最高精確度 (起點)
          LIMIT_V4 = 8    # IPv4 最低可容忍之遮罩寬度 (終點)
          
          print("正在執行精準度適配與動態壓縮 (僅限 IPv4)...")
          while True:
              collapsed_cn_v4 = compress_networks(cn_v4_nets, v4_prefix)
              
              total_rules = len(CUSTOM_DOMAINS) + len(collapsed_cn_v4)
              
              if total_rules <= MAX_TARGET:
                  print(f"ℹ️ 動態適配成功。最終精確度：IPv4: /{v4_prefix}")
                  break
                  
              if v4_prefix > LIMIT_V4:
                  v4_prefix -= 1
              else:
                  print(f"⚠️ 已達到最大壓縮極限 (IPv4: /{LIMIT_V4})，無法再進一步壓縮。")
                  break

          # ==========================================
          # 3. 按優先順序組合最終寫入清單
          # ==========================================
          split_tunnels = []
          
          # 1. 自訂排除域名
          for domain in CUSTOM_DOMAINS:
              split_tunnels.append({"host": domain, "description": f"Custom Domain ({domain})"})
              
          # 2. 自動動態壓縮的大陸 IPv4 網段
          for net in collapsed_cn_v4:
              split_tunnels.append({"address": str(net), "description": "Auto CN IPv4 (Aggregated)"})

          # ==========================================
          # 提交 API (保底硬截斷)
          # ==========================================
          if len(split_tunnels) > MAX_TARGET:
              print(f"⚠️ 警告: 即使經過動態壓縮總數仍有 {len(split_tunnels)} 條，執行截斷至 {MAX_TARGET} 條...")
              split_tunnels = split_tunnels[:MAX_TARGET]
              
          print(f"📊 最終寫入數量: {len(split_tunnels)} 條")
          
          put_url = f"https://api.cloudflare.com/client/v4/accounts/{CF_ACCOUNT_ID}/devices/policy/{policy_id}/exclude"
          update_resp = requests.put(put_url, headers=headers, json=split_tunnels)
          
          if update_resp.status_code == 200 and update_resp.json().get("success"):
              print("✅ 成功更新 Cloudflare Split Tunnels (Exclude)！")
          else:
              print("❌ 更新失敗:")
              print(update_resp.text)
              exit(1)
          EOF
