name: Cloudflare Zero Trust 分割隧道 (non-cn)

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  update-tunnels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests tldextract

      - name: Fetch, Parse and Update Cloudflare API
        env:
          CF_API_Zero_Trust_TOKEN: ${{ secrets.CF_API_Zero_Trust_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          POLICY_NAME: "non-cn"
        run: |
          python - << 'EOF'
          import os
          import requests
          import ipaddress
          import tldextract
          
          CF_API_Zero_Trust_TOKEN = os.environ.get("CF_API_Zero_Trust_TOKEN")
          CF_ACCOUNT_ID = os.environ.get("CF_ACCOUNT_ID")
          POLICY_NAME = os.environ.get("POLICY_NAME")
          
          if not CF_API_Zero_Trust_TOKEN or not CF_ACCOUNT_ID:
              print("錯誤: 找不到 CF_API_Zero_Trust_TOKEN 或 CF_ACCOUNT_ID 環境變數。")
              exit(1)
              
          headers = {
              "Authorization": f"Bearer {CF_API_Zero_Trust_TOKEN}",
              "Content-Type": "application/json"
          }
          
          print(f"正在獲取帳戶 {CF_ACCOUNT_ID} 的裝置設定檔清單...")
          resp = requests.get(f"https://api.cloudflare.com/client/v4/accounts/{CF_ACCOUNT_ID}/devices/policies", headers=headers)
          if resp.status_code != 200:
              print("取得 Policy 清單失敗:", resp.text)
              exit(1)
              
          policies = resp.json().get("result",[])
          policy_id = None
          for p in policies:
              if p.get("name") == POLICY_NAME:
                  policy_id = p.get("policy_id") or p.get("id")
                  break
                  
          if not policy_id:
              print(f"錯誤: 找不到名稱為 '{POLICY_NAME}' 的設定檔。")
              exit(1)

          # ==========================================
          # 來源定義 (僅保留 網域 與 私有IP)
          # ==========================================
          domain_url = "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo-lite/geosite/cn.list"
          ip_private_url = "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo-lite/geoip/private.list"
          
          print("正在下載來源清單 (Domains & Private IPs)...")
          dom_resp = requests.get(domain_url)
          ip_private_resp = requests.get(ip_private_url)
          
          # ==========================================
          # 1. 解析網域：同名合一 + 短網域優先
          # ==========================================
          seen_slds = {}
          has_cn_tld = False
          
          for line in dom_resp.text.splitlines():
              line = line.strip()
              if not line or line.startswith("#"): continue
              
              clean_domain = line
              if clean_domain.startswith("+."): clean_domain = clean_domain[2:]
              elif clean_domain.startswith("*."): clean_domain = clean_domain[2:]
                  
              if clean_domain.endswith(".cn") or clean_domain == "cn":
                  has_cn_tld = True
                  continue
              
              ext = tldextract.extract(clean_domain)
              sld = ext.domain
              root_domain = ext.registered_domain
              
              if sld:
                  if sld not in seen_slds:
                      if root_domain: seen_slds[sld] = f"*.{root_domain}"
                      else: seen_slds[sld] = f"*.{clean_domain}"
              else:
                  if clean_domain not in seen_slds:
                      seen_slds[clean_domain] = f"*.{clean_domain}"
                      
          domain_rules =[{"host": d, "description": "Auto CN domain"} for d in seen_slds.values()]
          # 按長度排序，優先保留核心短網域 (如 qq.com, baidu.com)
          domain_rules.sort(key=lambda x: len(x["host"]))

          # ==========================================
          # 2. 解析 私有 IP (精確保留，不進行暴力壓縮)
          # ==========================================
          private_nets = set()
          for line in ip_private_resp.text.splitlines():
              line = line.strip()
              if not line or line.startswith("#"): continue
              try:
                  net = ipaddress.ip_network(line, strict=False)
                  # 僅保留 IPv4
                  if net.version == 4: 
                      private_nets.add(net)
              except ValueError: pass
          
          # 進行標準合併 (例如多個 /24 合併為 /23)，保證內網連線精準無誤
          ip_rules =[{"address": str(net), "description": "Private IP"} for net in ipaddress.collapse_addresses(private_nets)]

          # ==========================================
          # 3. 智能組合與寫入 (上限 4000 條保護)
          # ==========================================
          # 私有 IP 與 *.cn 是絕對必須保留的底線規則
          must_have_rules = ip_rules
          if has_cn_tld:
              must_have_rules.append({"host": "*.cn", "description": "Auto CN TLD (*.cn)"})
              
          MAX_RULES = 4000
          available_domain_slots = MAX_RULES - len(must_have_rules)
          
          if available_domain_slots > 0:
              # 將剩餘空位全數留給精簡後的網域
              split_tunnels = must_have_rules + domain_rules[:available_domain_slots]
          else:
              split_tunnels = must_have_rules[:MAX_RULES]
              
          print(f"📊 統計結果:")
          print(f" - 私有 IP 規則: {len(ip_rules)} 條")
          print(f" - 網域規則 (精選後): {min(len(domain_rules), max(0, available_domain_slots))} 條")
          print(f"🚀 總計寫入: {len(split_tunnels)} 條 / 上限 4000 條")
          
          # ==========================================
          # 4. 透過 API 更新 Cloudflare Split Tunnels
          # ==========================================
          put_url = f"https://api.cloudflare.com/client/v4/accounts/{CF_ACCOUNT_ID}/devices/policy/{policy_id}/exclude"
          update_resp = requests.put(put_url, headers=headers, json=split_tunnels)
          
          if update_resp.status_code == 200 and update_resp.json().get("success"):
              print("✅ 成功更新 Cloudflare Split Tunnels (Exclude) 列表！")
          else:
              print("❌ 更新失敗:")
              print(update_resp.text)
              exit(1)
          EOF
