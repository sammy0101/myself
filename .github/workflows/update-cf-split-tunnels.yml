name: Cloudflare Zero Trust 分割隧道 (non-cn)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-tunnels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Fetch, Parse and Update Cloudflare API
        env:
          CF_API_Zero_Trust_TOKEN: ${{ secrets.CF_API_Zero_Trust_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          POLICY_NAME: "non-cn"
        run: |
          python - << 'EOF'
          import os
          import requests
          import ipaddress
          
          CF_API_Zero_Trust_TOKEN = os.environ.get("CF_API_Zero_Trust_TOKEN")
          CF_ACCOUNT_ID = os.environ.get("CF_ACCOUNT_ID")
          POLICY_NAME = os.environ.get("POLICY_NAME")
          
          if not CF_API_Zero_Trust_TOKEN or not CF_ACCOUNT_ID:
              print("錯誤: 找不到 CF_API_Zero_Trust_TOKEN 或 CF_ACCOUNT_ID 環境變數。")
              exit(1)
              
          headers = {
              "Authorization": f"Bearer {CF_API_Zero_Trust_TOKEN}",
              "Content-Type": "application/json"
          }
          
          print(f"正在獲取帳戶 {CF_ACCOUNT_ID} 的裝置設定檔清單...")
          resp = requests.get(f"https://api.cloudflare.com/client/v4/accounts/{CF_ACCOUNT_ID}/devices/policies", headers=headers)
          if resp.status_code != 200:
              print("取得 Policy 清單失敗:", resp.text)
              exit(1)
              
          policies = resp.json().get("result",[])
          policy_id = None
          for p in policies:
              if p.get("name") == POLICY_NAME:
                  policy_id = p.get("policy_id") or p.get("id")
                  break
                  
          if not policy_id:
              print(f"錯誤: 找不到名稱為 '{POLICY_NAME}' 的設定檔。")
              exit(1)
              
          print(f"找到設定檔 '{POLICY_NAME}'，ID: {policy_id}")
          
          domain_url = "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/geolocation-cn.list"
          ip_url = "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/cn.list"
          
          print("正在下載來源清單...")
          dom_resp = requests.get(domain_url)
          ip_resp = requests.get(ip_url)
          
          domain_rules = []
          ip_rules =[]
          seen_domains = set()
          has_cn_tld = False
          
          # ==========================================
          # 解析網域 (domains) 並精簡 .cn
          # ==========================================
          for line in dom_resp.text.splitlines():
              line = line.strip()
              if not line or line.startswith("#"): continue
              
              # 【核心優化】如果網域以 .cn 結尾，標記後直接跳過，不佔用個別額度
              if line.endswith(".cn") or line == "cn" or line == "*.cn" or line == "+.cn":
                  has_cn_tld = True
                  continue
              
              domain = line
              if domain.startswith("+."):
                  domain = domain[2:]
                  wildcard = f"*.{domain}"
                  if wildcard not in seen_domains:
                      domain_rules.append({"host": wildcard, "description": "Auto CN domain"})
                      seen_domains.add(wildcard)
                  if domain not in seen_domains:
                      domain_rules.append({"host": domain, "description": "Auto CN domain"})
                      seen_domains.add(domain)
              elif domain.startswith("*."):
                  if domain not in seen_domains:
                      domain_rules.append({"host": domain, "description": "Auto CN domain"})
                      seen_domains.add(domain)
                  base = domain[2:]
                  if base not in seen_domains:
                      domain_rules.append({"host": base, "description": "Auto CN domain"})
                      seen_domains.add(base)
              else:
                  if domain not in seen_domains:
                      domain_rules.append({"host": domain, "description": "Auto CN domain"})
                      seen_domains.add(domain)
          
          # 迴圈結束後，將統一的 *.cn 規則加入清單
          if has_cn_tld:
              if "*.cn" not in seen_domains:
                  domain_rules.append({"host": "*.cn", "description": "Auto CN TLD (*.cn)"})
                  seen_domains.add("*.cn")
              if "cn" not in seen_domains:
                  domain_rules.append({"host": "cn", "description": "Auto CN TLD (cn)"})
                  seen_domains.add("cn")
          
          # ==========================================
          # 解析並壓縮 IP 網段 (CIDR)
          # ==========================================
          ipv4_nets = []
          ipv6_nets =[]
          for line in ip_resp.text.splitlines():
              line = line.strip()
              if not line or line.startswith("#"): continue
              try:
                  net = ipaddress.ip_network(line, strict=False)
                  if net.version == 4:
                      ipv4_nets.append(net)
                  else:
                      ipv6_nets.append(net)
              except ValueError:
                  pass
          
          collapsed_ipv4 = list(ipaddress.collapse_addresses(ipv4_nets))
          collapsed_ipv6 = list(ipaddress.collapse_addresses(ipv6_nets))
          
          for net in collapsed_ipv4:
              ip_rules.append({"address": str(net), "description": "Auto CN IPv4"})
          for net in collapsed_ipv6:
              ip_rules.append({"address": str(net), "description": "Auto CN IPv6"})
              
          print(f"解析完畢: 網域 {len(domain_rules)} 條, IP 合併後 {len(ip_rules)} 條")
          
          # ==========================================
          # 組合、限制數量至 4000 條以內
          # ==========================================
          MAX_RULES = 4000
          
          split_tunnels = domain_rules + ip_rules
          
          if len(split_tunnels) > MAX_RULES:
              print(f"⚠️ 警告: 總規則數 ({len(split_tunnels)}) 依然超過 Cloudflare 上限 {MAX_RULES} 條。")
              print(f"將自動裁切保留前 {MAX_RULES} 條規則。")
              split_tunnels = split_tunnels[:MAX_RULES]
          
          print(f"準備寫入 {len(split_tunnels)} 條規則至 Cloudflare Split Tunnels (Exclude)...")
          put_url = f"https://api.cloudflare.com/client/v4/accounts/{CF_ACCOUNT_ID}/devices/policy/{policy_id}/exclude"
          
          update_resp = requests.put(put_url, headers=headers, json=split_tunnels)
          
          if update_resp.status_code == 200 and update_resp.json().get("success"):
              print("✅ 成功更新 Cloudflare Split Tunnels Exclude 列表！")
          else:
              print("❌ 更新失敗:")
              print(update_resp.text)
              exit(1)
          EOF
