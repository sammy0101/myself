name: '[Scheduled] Create OCI A1 Flex VM'

on:
  schedule:
    # 每天 UTC 時間 0 點和 12 點各運行一次
    - cron: '0 0,12 * * *'
  workflow_dispatch:
    inputs:
      vm-name:
        description: '虛擬機器的名稱'
        required: true
        default: 'a1-flex-vm'
        type: string

env:
  OCI_REGION: ${{ secrets.OCI_REGION }}
  OCI_AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
  OCI_COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
  OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
  OCI_IMAGE_OCID: ${{ secrets.OCI_IMAGE_OCID }}
  VM_SHAPE: 'VM.Standard.A1.Flex'
  OCPU_COUNT: 2
  MEMORY_IN_GB: 12
  PIP_BREAK_SYSTEM_PACKAGES: 1  # 防止 Ubuntu 的 pip 安裝限制阻礙 oci-cli 的安裝

jobs:
  create-vm:
    runs-on: ubuntu-22.04
    outputs:
      time: ${{ steps.get-current-time.outputs.time }}
      vm_exists: ${{ steps.check-vm-exists.outputs.exists }}
      checked_vm_name: ${{ steps.determine-vm-name.outputs.vm_name }}
      creation_status: ${{ steps.create-vm-script.outputs.success }}
      attempt_count: ${{ steps.create-vm-script.outputs.attempt_count }}
      error_message: ${{ steps.create-vm-script.outputs.error_message }}
      vm_name: ${{ steps.create-vm-script.outputs.vm_name }}
      public_ip: ${{ steps.get-ip.outputs.public_ip }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 獲取當前時間
        id: get-current-time
        run: echo "time=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT

      - name: 設置 Python and OCI CLI
        run: |
          pip install oci-cli
          mkdir -p ~/.oci
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_ID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          key_file=~/.oci/oci_api_key.pem
          tenancy=${{ secrets.OCI_TENANCY }}
          region=${{ env.OCI_REGION }}
          EOF
          echo "${{ secrets.OCI_API_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/config ~/.oci/oci_api_key.pem

      - name: 決定 VM 名稱
        id: determine-vm-name
        run: |
          VM_NAME=""
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VM_NAME="${{ inputs.vm-name }}"
            echo "使用手動觸發的名稱: $VM_NAME"
          else
            VM_NAME="a1-flex-vm"
            echo "為定時任務使用固定名稱: $VM_NAME"
          fi
          echo "vm_name=$VM_NAME" >> "$GITHUB_OUTPUT"

      - name: 檢查同名 VM 是否已存在
        id: check-vm-exists
        run: |
          VM_NAME_TO_CHECK="${{ steps.determine-vm-name.outputs.vm_name }}"
          echo "正在檢查 VM 名稱: $VM_NAME_TO_CHECK"
          set +e
          # 使用 JMESPath 查詢排除 TERMINATED 與 TERMINATING 狀態的同名 VM
          # 解決 `--lifecycle-state` 在 OCI CLI 中重複宣告時會被覆蓋的 Bug
          EXISTING_VM_OCID=$(oci compute instance list \
            --compartment-id "${{ env.OCI_COMPARTMENT_ID }}" \
            --query "data[?\"display-name\"=='$VM_NAME_TO_CHECK' && !contains(['TERMINATED', 'TERMINATING'], \"lifecycle-state\")].id | [0]" \
            --raw-output)
          exit_code=$?
          set -e
          if [ $exit_code -ne 0 ]; then
            echo "⚠️  OCI CLI 查詢命令失敗，無法檢查 VM 是否存在。為安全起見，將跳過創建。"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$EXISTING_VM_OCID" ] && [ "$EXISTING_VM_OCID" != "null" ]; then
            echo "❌ 發現已存在的同名 VM: $VM_NAME_TO_CHECK (OCID: $EXISTING_VM_OCID)"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "✅ 未發現同名的活動 VM，可以繼續。"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 生成 cloud-init 腳本
        if: steps.check-vm-exists.outputs.exists == 'false'
        run: |
          cat > cloud-init.txt << EOF
          #cloud-config
          users:
            - name: root
              lock_passwd: false
          chpasswd:
            list: |
              root:${{ secrets.ROOT_PASSWORD }}
            expire: false
          runcmd:
            - sed -i 's/^#?PermitRootLogin.*/PermitRootLogin yes/g' /etc/ssh/sshd_config
            - sed -i 's/^#?PasswordAuthentication.*/PasswordAuthentication yes/g' /etc/ssh/sshd_config
            - systemctl restart sshd || systemctl restart ssh
          EOF

      - name: 執行創建 VM 的腳本
        id: create-vm-script
        if: steps.check-vm-exists.outputs.exists == 'false'
        env:
          INPUT_VM_NAME: ${{ steps.determine-vm-name.outputs.vm_name }}
        run: |
          chmod +x ./scripts/create_vm.sh
          ./scripts/create_vm.sh
      
      - name: 等待實例達到 RUNNING 狀態
        if: steps.check-vm-exists.outputs.exists == 'false' && steps.create-vm-script.outputs.success == 'true'
        id: wait-for-running
        run: |
          oci compute instance wait-for-state --instance-id "${{ steps.create-vm-script.outputs.instance_ocid }}" --wait-for-state "RUNNING" --wait-interval-seconds 15

      - name: 獲取虛擬機器公網 IP
        if: steps.check-vm-exists.outputs.exists == 'false' && steps.create-vm-script.outputs.success == 'true'
        id: get-ip
        run: |
          PUBLIC_IP=$(oci compute instance list-vnics --instance-id "${{ steps.create-vm-script.outputs.instance_ocid }}" --query 'data[0]."public-ip"' --raw-output)
          echo "public_ip=$PUBLIC_IP" >> "$GITHUB_OUTPUT"

  notify:
    name: Send Telegram Notification
    needs: create-vm
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 準備 Telegram 訊息內容
        id: prep-msg
        env:
          EVENT_NAME: ${{ github.event_name }}
          VM_EXISTS: ${{ needs.create-vm.outputs.vm_exists }}
          CHECKED_VM_NAME: ${{ needs.create-vm.outputs.checked_vm_name }}
          CREATION_STATUS: ${{ needs.create-vm.outputs.creation_status }}
          ATTEMPT_COUNT: ${{ needs.create-vm.outputs.attempt_count }}
          ERROR_MESSAGE: ${{ needs.create-vm.outputs.error_message }}
          VM_NAME: ${{ needs.create-vm.outputs.vm_name }}
          PUBLIC_IP: ${{ needs.create-vm.outputs.public_ip }}
          EXEC_TIME: ${{ needs.create-vm.outputs.time }}
        run: |
          TRIGGER_TYPE=$([ "$EVENT_NAME" = "workflow_dispatch" ] && echo "手動觸發" || echo "定時任務")
          
          # 使用 Here-Document (cat << 'EOF') 構建 HTML 訊息
          # 這樣做能完美避免多行引號不合，或 API 錯誤訊息內含花括號 {} 導致 GitHub Action 語法解析崩潰的問題
          if [ "$VM_EXISTS" = "true" ] || [ -z "$VM_EXISTS" ]; then
            REASON="名為 \"${CHECKED_VM_NAME:-unknown}\" 的虛擬機器已存在或前置檢查失敗。"
            MSG=$(cat <<EOF
          <b>OCI 虛擬機器建立 - 操作取消</b>
          • <b>觸發方式:</b> ${TRIGGER_TYPE}
          • <b>執行時間:</b> ${EXEC_TIME:-未知時間}
          • <b>狀態:</b> 🟡 已跳過 / 取消
          • <b>原因:</b> ${REASON}
          • <b>區域:</b> ${{ env.OCI_REGION }}
          • <b>詳情:</b> <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">查看日誌</a>
          EOF
          )
          else
            STATUS_STR=$([ "$CREATION_STATUS" = "true" ] && echo "✅ 成功" || echo "❌ 失敗")
            MSG_STR=$([ "$CREATION_STATUS" = "true" ] && echo "VM 創建成功" || echo "${ERROR_MESSAGE:-未知錯誤}")
            
            VM_INFO=""
            if [ "$CREATION_STATUS" = "true" ]; then
              VM_INFO=$(cat <<EOF
          
          <b>VM 資訊</b>
          • <b>虛擬機器名稱:</b> ${VM_NAME}
          • <b>公網 IP:</b> ${PUBLIC_IP:-獲取失敗}
          EOF
              )
            fi
            
            MSG=$(cat <<EOF
          <b>OCI 虛擬機器建立結果</b>
          • <b>觸發方式:</b> ${TRIGGER_TYPE}
          • <b>執行時間:</b> ${EXEC_TIME}
          • <b>狀態:</b> ${STATUS_STR}
          • <b>嘗試次數:</b> ${ATTEMPT_COUNT:-1}
          • <b>訊息:</b> ${MSG_STR}
          • <b>區域:</b> ${{ env.OCI_REGION }}
          • <b>詳情:</b> <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">查看日誌</a>${VM_INFO}
          EOF
          )
          fi
          
          # 使用 GitHub 推薦的隨機分隔符安全寫入多行輸出
          EOF_DELIMITER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64 | tr -dc 'a-zA-Z0-9')
          echo "telegram_message<<$EOF_DELIMITER" >> "$GITHUB_OUTPUT"
          echo "$MSG" >> "$GITHUB_OUTPUT"
          echo "$EOF_DELIMITER" >> "$GITHUB_OUTPUT"

      - name: 發送 Telegram 通知
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: ${{ steps.prep-msg.outputs.telegram_message }}
