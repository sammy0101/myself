# ==================================================
# 流量路由
# ==================================================
rules:
  - RULE-SET,meta-ads,🛑 廣告攔截
  - RULE-SET,meta-private,🏠 私有網絡
  - RULE-SET,my-ai,💬 AI 服務
  - RULE-SET,meta-apple,🍎 蘋果服務
  - RULE-SET,microsoft,Ⓜ️ 微軟服務
  - RULE-SET,steam,🎮 遊戲平台
  - RULE-SET,epicgames,🎮 遊戲平台
  - RULE-SET,ea,🎮 遊戲平台
  - RULE-SET,ubisoft,🎮 遊戲平台
  - RULE-SET,blizzard,🎮 遊戲平台
