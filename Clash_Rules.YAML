port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

# ---------------- 流量嗅探器 (借鑒 Aethersailor) ----------------
sniffer:
  enable: true
  override-destination: true
  sniff:
    QUIC:
      ports:
        - 443
    TLS:
      ports:
        - 443
        - 8443
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
  force-domain:
    - "+.netflix.com"
    - "+.nflxvideo.net"
    - "+.amazonaws.com"
    - "+.media.dssott.com"
  skip-domain:
    - "+.apple.com"
    - "Mijia Cloud"
    - "dlg.io.mi.com"
    - "+.oray.com"
    - "+.sunlogin.net"
    - "+.push.apple.com"
  parse-pure-ip: true
  force-dns-mapping: true

# ---------------- 進階 DNS (借鑒 Aethersailor + 極速直連優化) ----------------
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  respect-rules: false
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.localhost'
    - '*.home.arpa'
    - 'captive.apple.com'
    - 'time.apple.com'
    - 'time.*.apple.com'
    - 'time.*.com'
    - 'time.*.gov'
    - 'time.*.edu.cn'
    - 'ntp.*.com'

  # 國內直連公共 DNS
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.99

  nameserver-policy:
    "rule-set:meta-cn":
      - 223.5.5.5
      - 119.29.29.99
    "rule-set:meta-private":
      - 223.5.5.5
      - 119.29.29.99
    "rule-set:meta-apple":
      - 223.5.5.5
      - 119.29.29.99

  # 國外兜底
  nameserver:
    - 8.8.8.8
    - 1.1.1.1

# ==================================================
# 代理節點設定
# ==================================================
proxies:
  # 這裡請放入實際節點，否則 ⚡ 自動選擇 無法運作
  # - name: 
  #   type: vless
  #   ...

proxy-groups:
  - name: 🚀 節點選擇
    type: select
    proxies:
      - ⚡ 自動選擇
      - DIRECT

  - name: ⚡ 自動選擇
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      # 這裡請放入實際節點名稱

  - name: 💬 AI 服務
    type: select
    proxies:
      - ⚡ 自動選擇
      - 🚀 節點選擇

  - name: 🌐 非中國
    type: select
    proxies:
      - 🚀 節點選擇
      - DIRECT

  - name: 🇨🇳 國內服務
    type: select
    proxies:
      - DIRECT
      - 🚀 節點選擇

  - name: 🍎 蘋果服務
    type: select
    proxies:
      - DIRECT
      - 🚀 節點選擇

  - name: 🎮 遊戲平台
    type: select
    proxies:
      - DIRECT
      - 🚀 節點選擇

  - name: Ⓜ️ 微軟服務
    type: select
    proxies:
      - DIRECT
      - 🚀 節點選擇

  - name: 🏠 私有網絡
    type: select
    proxies:
      - DIRECT

  - name: 🛑 廣告攔截
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: 🐟 漏網之魚
    type: select
    proxies:
      - 🚀 節點選擇
      - DIRECT

# ==================================================
# 規則集
# ==================================================
rule-providers:
