port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

# ---------------- 反向思維 DNS (預設全域加密) ----------------
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-filter:
    - '+.lan'
    - '+.local'
  # 僅用於解析「你的節點伺服器域名」，不參與日常網頁解析
  default-nameserver:
    - 223.5.5.5
  # 反向思維核心：預設 DNS 只有 8.8.8.8 和 1.1.1.1，強制綁定走代理！
  nameserver:
    - https://8.8.8.8/dns-query#🚀 節點選擇
    - https://1.1.1.1/dns-query#🚀 節點選擇
  # 僅針對國內網域「開後門」走國內解析
  nameserver-policy:
    "rule-set:meta-cn,meta-private":
      - https://223.5.5.5/dns-query
      - https://119.29.29.29/dns-query

proxies:

proxy-groups:
  - name: 🚀 節點選擇
    type: select
    proxies:
      - ⚡ 自動選擇
      - DIRECT

  - name: ⚡ 自動選擇
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:

  - name: 💬 AI 服務
    type: select
    proxies:
      - ⚡ 自動選擇
      - 🚀 節點選擇

  - name: 🇨🇳 國內服務
    type: select
    proxies:
      - DIRECT
      - 🚀 節點選擇

  - name: 🏠 私有網絡
    type: select
    proxies:
      - DIRECT

  - name: 🐟 漏網之魚
    type: select
    proxies:
      - 🚀 節點選擇
      - DIRECT

  - name: 🛑 廣告攔截
    type: select
    proxies:
      - REJECT
      - DIRECT

# ---------------- 規則集 ----------------
rule-providers:
  my-ai:
    type: http
    behavior: domain
    format: mrs
    url: "https://github.com/sammy0101/myself/raw/refs/heads/main/geosite_ai_hk_proxy.mrs"
    path: ./ruleset/my-ai.mrs
    interval: 86400

  meta-gfw:
    type: http
    behavior: domain
    format: mrs
    url: "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/gfw.mrs"
    path: ./ruleset/gfw.mrs
    interval: 86400

  meta-telegram:
    type: http
    behavior: ipcidr
    format: mrs
    url: "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/telegram.mrs"
    path: ./ruleset/telegram.mrs
    interval: 86400

  meta-cn:
    type: http
    behavior: domain
    format: mrs
    url: "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/cn.mrs"
    path: ./ruleset/cn.mrs
    interval: 86400

  meta-cn-ip:
    type: http
    behavior: ipcidr
    format: mrs
    url: "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/cn.mrs"
    path: ./ruleset/cn-ip.mrs
    interval: 86400

  meta-ads:
    type: http
    behavior: domain
    format: mrs
    url: "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/category-ads-all.mrs"
    path: ./ruleset/ads.mrs
    interval: 86400

  meta-private:
    type: http
    behavior: domain
    format: mrs
    url: "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/private.mrs"
    path: ./ruleset/private.mrs
    interval: 86400

  meta-ip-private:
    type: http
    behavior: ipcidr
    format: mrs
    url: "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/private.mrs"
    path: ./ruleset/ip-private.mrs
    interval: 86400

# ---------------- 流量路由 ----------------
rules:
  # 0. 防禦機制：強制攔截所有軟體偷跑的明文 DNS (53端口)，一律交給代理
  - DST-PORT,53,🚀 節點選擇

  # 1. 廣告與內網攔截
  - RULE-SET,meta-ads,🛑 廣告攔截
  - RULE-SET,meta-private,🏠 私有網絡

  # 2. 核心業務強制走代理
  - RULE-SET,my-ai,💬 AI 服務
  - RULE-SET,meta-gfw,🚀 節點選擇
  - RULE-SET,meta-telegram,🚀 節點選擇

  # 3. 國內白名單：只有這裡面的網域/IP 才直連
  - RULE-SET,meta-cn,🇨🇳 國內服務
  - RULE-SET,meta-cn-ip,🇨🇳 國內服務
  - RULE-SET,meta-ip-private,🏠 私有網絡

  # 4. 絕對兜底：不在白名單裡的一律走代理
  - MATCH,🐟 漏網之魚
