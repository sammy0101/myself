port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

# ---------------- 經典 DNS (無回環、直連優化版) ----------------
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.localhost'
    - '*.home.arpa'
    - 'captive.apple.com'
    - 'time.apple.com'
    - 'time.*.apple.com'
    - 'time.*.com'
    - 'time.*.gov'
    - 'time.*.edu.cn'
    - 'ntp.*.com'
  
  # 國內直連公共 DNS (純 IP)
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    
  nameserver-policy:
    # 國內直連與蘋果服務，使用純 UDP 國內 DNS，0毫秒延遲
    "rule-set:meta-cn,meta-private,meta-apple":
      - 223.5.5.5
      - 119.29.29.29
      
  # 國外兜底使用純 UDP，省去 TLS 握手，DIRECT 直連也不會超時卡頓
  nameserver:
    - 8.8.8.8
    - 1.1.1.1

proxies:
# 請在此處填寫您的節點資訊

proxy-groups:
  - name: 🚀 節點選擇
    type: select
    proxies:
      - ⚡ 自動選擇
      - DIRECT

  - name: ⚡ 自動選擇
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      # 請在此處填寫您的節點名稱

  - name: 💬 AI 服務
    type: select
    proxies:
      - ⚡ 自動選擇
      - 🚀 節點選擇

  - name: 🍎 蘋果服務
    type: select
    proxies:
      - DIRECT
      - 🚀 節點選擇

  - name: 🇨🇳 國內服務
    type: select
    proxies:
      - DIRECT
      - 🚀 節點選擇

  - name: 🏠 私有網絡
    type: select
    proxies:
      - DIRECT

  - name: 🐟 漏網之魚
    type: select
    proxies:
      - 🚀 節點選擇
      - DIRECT

  - name: 🛑 廣告攔截
    type: select
    proxies:
      - REJECT
      - DIRECT

# ---------------- 規則集 ----------------
rule-providers:
  my-ai:
    type: http
    behavior: domain
    format: mrs
    url: "https://github.com/sammy0101/myself/raw/refs/heads/main/geosite_ai_hk_proxy.mrs"
    path: ./ruleset/my-ai.mrs
    interval: 86400

  meta-telegram:
    type: http
    behavior: ipcidr
    format: mrs
    url: "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/telegram.mrs"
    path: ./ruleset/telegram.mrs
    interval: 86400

  meta-apple:
    type: http
    behavior: domain
    format: mrs
    url: "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/apple.mrs"
    path: ./ruleset/apple.mrs
    interval: 86400

  meta-cn:
    type: http
    behavior: domain
    format: mrs
    url: "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/cn.mrs"
    path: ./ruleset/cn.mrs
    interval: 86400

  meta-cn-ip:
    type: http
    behavior: ipcidr
    format: mrs
    url: "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/cn.mrs"
    path: ./ruleset/cn-ip.mrs
    interval: 86400

  meta-ads:
    type: http
    behavior: domain
    format: mrs
    url: "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/category-ads-all.mrs"
    path: ./ruleset/ads.mrs
    interval: 86400

  meta-private:
    type: http
    behavior: domain
    format: mrs
    url: "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/private.mrs"
    path: ./ruleset/private.mrs
    interval: 86400

  meta-ip-private:
    type: http
    behavior: ipcidr
    format: mrs
    url: "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/private.mrs"
    path: ./ruleset/ip-private.mrs
    interval: 86400

# ---------------- 流量路由 ----------------
rules:
  # 1. 廣告與內網 (純域名)
  - RULE-SET,meta-ads,🛑 廣告攔截
  - RULE-SET,meta-private,🏠 私有網絡

  # 2. 強制代理業務
  - RULE-SET,my-ai,💬 AI 服務
  - RULE-SET,meta-telegram,🚀 節點選擇,no-resolve

  # 3. Apple 服務分流
  - RULE-SET,meta-apple,🍎 蘋果服務

  # 4. 中國國內網域與 IP：走直連
  - RULE-SET,meta-cn,🇨🇳 國內服務
  - RULE-SET,meta-cn-ip,🇨🇳 國內服務,no-resolve
  - RULE-SET,meta-ip-private,🏠 私有網絡,no-resolve

  # 5. 國外網站兜底：全走代理
  - MATCH,🐟 漏網之魚
