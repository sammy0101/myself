port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

# ---------------- DNS 國內外分流防洩漏 ----------------
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-filter:
    - '+.lan'
    - '+.local'
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://8.8.8.8/dns-query#🚀 節點選擇
    - https://1.1.1.1/dns-query#🚀 節點選擇
  nameserver-policy:
    "rule-set:meta-cn,meta-private":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query

proxies:

proxy-groups:
  - name: 🚀 節點選擇
    type: select
    proxies:
      - ⚡ 自動選擇
      - DIRECT

  - name: ⚡ 自動選擇
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:

  - name: 💬 AI 服務
    type: select
    proxies:
      - ⚡ 自動選擇
      - 🚀 節點選擇

  - name: 🇨🇳 國內服務
    type: select
    proxies:
      - DIRECT
      - 🚀 節點選擇

  - name: 🏠 私有網絡
    type: select
    proxies:
      - DIRECT

  - name: 🐟 漏網之魚
    type: select
    proxies:
      - 🚀 節點選擇
      - DIRECT

  - name: 🛑 廣告攔截
    type: select
    proxies:
      - REJECT
      - DIRECT

# ---------------- 規則集 ----------------
rule-providers:
  my-ai:
    type: http
    behavior: domain
    format: mrs
    url: "https://github.com/sammy0101/myself/raw/refs/heads/main/geosite_ai_hk_proxy.mrs"
    path: ./ruleset/my-ai.mrs
    interval: 86400

  meta-gfw:
    type: http
    behavior: domain
    format: mrs
    url: "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/gfw.mrs"
    path: ./ruleset/gfw.mrs
    interval: 86400

  meta-telegram:
    type: http
    behavior: ipcidr
    format: mrs
    url: "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/telegram.mrs"
    path: ./ruleset/telegram.mrs
    interval: 86400

  meta-cn:
    type: http
    behavior: domain
    format: mrs
    url: "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/cn.mrs"
    path: ./ruleset/cn.mrs
    interval: 86400

  meta-cn-ip:
    type: http
    behavior: ipcidr
    format: mrs
    url: "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/cn.mrs"
    path: ./ruleset/cn-ip.mrs
    interval: 86400

  meta-ads:
    type: http
    behavior: domain
    format: mrs
    url: "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/category-ads-all.mrs"
    path: ./ruleset/ads.mrs
    interval: 86400

  meta-private:
    type: http
    behavior: domain
    format: mrs
    url: "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/private.mrs"
    path: ./ruleset/private.mrs
    interval: 86400

  meta-ip-private:
    type: http
    behavior: ipcidr
    format: mrs
    url: "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/private.mrs"
    path: ./ruleset/ip-private.mrs
    interval: 86400

# ---------------- 流量路由 ----------------
rules:
  # 1. 最優先：攔截廣告與內網直連
  - RULE-SET,meta-ads,🛑 廣告攔截
  - RULE-SET,meta-private,🏠 私有網絡

  # 2. 核心業務與被牆清單：強制走代理 (放在 cn 之前，防誤判)
  - RULE-SET,my-ai,💬 AI 服務
  - RULE-SET,meta-gfw,🚀 節點選擇
  - RULE-SET,meta-telegram,🚀 節點選擇

  # 3. 國內服務：匹配到中國網域或 IP 走國內策略組
  - RULE-SET,meta-cn,🇨🇳 國內服務
  - RULE-SET,meta-cn-ip,🇨🇳 國內服務
  - RULE-SET,meta-ip-private,🏠 私有網絡

  # 4. 最終兜底：未匹配的所有流量皆走代理
  - MATCH,🐟 漏網之魚
